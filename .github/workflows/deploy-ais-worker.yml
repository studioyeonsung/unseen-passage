name: Deploy AIS Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-ais-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "Missing secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Missing secret: CLOUDFLARE_ACCOUNT_ID"
            missing=1
          fi
          if [ -z "${{ secrets.AISSTREAM_API_KEY }}" ]; then
            echo "Missing secret: AISSTREAM_API_KEY"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Validate Account ID format
        run: |
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          if ! echo "$ACCOUNT_ID" | grep -Eq '^[a-f0-9]{32}$'; then
            echo "CLOUDFLARE_ACCOUNT_ID 형식이 잘못됐습니다."
            echo "Cloudflare 대시보드 오른쪽 'Account ID'(32자리)를 넣어야 합니다."
            echo "Zone ID(도메인 ID)가 아닙니다."
            exit 1
          fi

      - name: Install dependencies
        working-directory: worker
        run: npm install

      - name: Verify Cloudflare credentials
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler whoami

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --verbose

      - name: Upload AIS API key secret
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: printf '%s' "$AISSTREAM_API_KEY" | npx wrangler secret put AISSTREAM_API_KEY
